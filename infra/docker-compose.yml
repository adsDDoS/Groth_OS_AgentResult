services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_growth_os}
      POSTGRES_USER: ${POSTGRES_USER:-ai_growth_os}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_growth_os}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_growth_os} -d ${POSTGRES_DB:-ai_growth_os}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: sh -c "node apps/backend/dist/db/migrate.js && node apps/backend/dist/main.js"

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: agentresult-hermes
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      AI_GROWTH_OS_BACKEND_URL: http://backend:3000
      AI_GROWTH_OS_AGENT_API_KEY: ${AI_GROWTH_OS_AGENT_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${HERMES_TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${HERMES_TELEGRAM_ALLOWED_USERS:-}
      TELEGRAM_HOME_CHANNEL: ${HERMES_TELEGRAM_HOME_CHANNEL:-}
      HERMES_TELEGRAM_MODE: ${HERMES_TELEGRAM_MODE:-owner_control}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY:-}
    command: ["gateway", "run"]
    ports:
      - "127.0.0.1:8642:8642"
    profiles:
      - agents
    volumes:
      - ../.runtime/hermes:/opt/data
      - ../agents/hermes-template/skills:/opt/data/skills:ro
      - ../agents/hermes-template/workspace/SOUL.md:/opt/data/SOUL.md:ro

  caddy:
    image: caddy:2-alpine
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
