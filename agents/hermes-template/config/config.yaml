runtime:
  name: ai-growth-os-hermes-template
  mode: manual-first
  workspace: /workspace

model:
  provider: openrouter
  model: ${OPENROUTER_MODEL}

backend:
  base_url: ${AI_GROWTH_OS_BACKEND_URL}
  api_key: ${AI_GROWTH_OS_AGENT_API_KEY}

telegram:
  mode: ${HERMES_TELEGRAM_MODE}
  bot_token_env: TELEGRAM_BOT_TOKEN
  allowed_users_env: TELEGRAM_ALLOWED_USERS
  home_channel_env: TELEGRAM_HOME_CHANNEL
  control_surface: owner_decisions

policies:
  - GROWTH_POLICY.md
  - CONTENT_POLICY.md
  - GEO_POLICY.md

tools:
  publishing:
    mode: approval_required
  browser_research:
    enabled: false
  manual_exports:
    enabled: true
